<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevAnalytics Suite{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <!-- Premium Navbar -->
    <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="h-3 w-3 rounded-full bg-emerald-500 animate-ping"></div>
                <span class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-500">
                    NEXUS_DEPLOY
                </span>
            </div>
            
            <!-- Navigation Links -->
            <div class="hidden md:flex items-center space-x-8 text-sm font-medium">
                <a href="{% url 'home' %}" class="hover:text-cyan-400 transition-colors flex items-center space-x-2">
                    <i class="fa-solid to-blue-400 fa-chart-pie"></i> <span>Dashboard</span>
                </a>
                <a href="{% url 'portfolio' %}" class="hover:text-cyan-400 transition-colors flex items-center space-x-2">
                    <i class="fa-solid fa-cubes"></i> <span>Project Registry</span>
                </a>
                <a href="{% url 'sandbox' %}" class="hover:text-cyan-400 transition-colors flex items-center space-x-2">
                    <i class="fa-solid fa-terminal"></i> <span>Dev Sandbox</span>
                </a>
            </div>

            <div class="text-xs font-mono bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700 text-cyan-400">
                <i class="fa-brands fa-aws mr-1"></i> production.node
            </div>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-900 bg-slate-900/30 text-center text-xs text-slate-500 py-6 mt-12">
        Nexus Automated Deployment Pipeline System • Current Architecture Live
    </footer>
</body>
</html>
